{% extends 'layout.html' %}

{% block title %}Adicionar Jogador{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <h2 class="h5">Adicionar novo jogador</h2>
        <form method="post" class="mt-3">
          <div class="mb-3">
            <label for="nome" class="form-label">Nome</label>
            <input type="text" id="nome" name="nome" class="form-control" required>
          </div>
          <div class="mb-3">
            <label for="posicao" class="form-label">Posição</label>
            <input type="text" id="posicao" name="posicao" class="form-control">
          </div>
          <div class="mb-3">
            <label for="idade" class="form-label">Idade</label>
            <input type="number" id="idade" name="idade" class="form-control" min="16" max="50">
          </div>
          <div class="mb-3">
            <label for="id_equipa" class="form-label">Equipa</label>
            <select id="id_equipa" name="id_equipa" class="form-select" required>
              <option value="">Seleciona uma equipa</option>
              {% for equipa in equipas %}
                <option value="{{ equipa['id_equipa'] }}">{{ equipa['nome'] }}</option>
              {% endfor %}
            </select>
          </div>
          <button type="submit" class="btn btn-success w-100">Guardar jogador</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
